<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GPT Image" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa-icon.svg" />
    <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml" />
    <title>GPT Image Playground</title>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {},
        Tawk_LoadStart = new Date()
      try {
        var user = JSON.parse(localStorage.getItem('sub2api-current-user') || '{}')
        if (user && user.id) {
          Tawk_API.visitor = {
            name: user.email || '',
            email: user.email || '',
          }
          Tawk_API.onLoad = function () {
            Tawk_API.setAttributes(
              {
                userid: String(user.id),
                username: user.username || '',
                role: String(user.role || ''),
              },
              function () {},
            )
          }
        }
      } catch (e) {}
      ;(function () {
        var s1 = document.createElement('script'),
          s0 = document.getElementsByTagName('script')[0]
        s1.async = true
        s1.src = 'https://embed.tawk.to/6a4915b2539b7e1d4b7d3ed1/1jsmnpgit'
        s1.charset = 'UTF-8'
        s1.setAttribute('crossorigin', '*')
        s0.parentNode.insertBefore(s1, s0)
      })()
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
